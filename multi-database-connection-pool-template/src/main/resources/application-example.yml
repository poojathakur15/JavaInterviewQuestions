# =============================================================================
# HikariCP Advanced Configuration Options
# =============================================================================
# hikari:
#   maximum-pool-size: 20              # Maximum number of connections in pool
#   minimum-idle: 10                   # Minimum idle connections
#   connection-timeout: 30000          # Max time to wait for connection (ms)
#   idle-timeout: 600000               # Max time connection can sit idle (ms)
#   max-lifetime: 1800000              # Max lifetime of connection in pool (ms)
#   auto-commit: true                  # Auto-commit behavior
#   connection-test-query: SELECT 1    # Query to test connection validity
#   pool-name: MyHikariPool            # Name for the connection pool
#   leak-detection-threshold: 60000    # Detect connection leaks after 60s
#   validation-timeout: 5000           # Max time for connection validation

# =============================================================================
# JPA/Hibernate Configuration
# =============================================================================
  jpa:
    hibernate:
      ddl-auto: update  # Options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    com.example: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.zaxxer.hikari: DEBUG

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8080
  servlet:
    context-path: /api

# =============================================================================
# Application Information
# =============================================================================
info:
  app:
    name: Multi-Database Connection Pool Template
    description: Spring Boot template for multiple database connections
    version: 1.0.0

