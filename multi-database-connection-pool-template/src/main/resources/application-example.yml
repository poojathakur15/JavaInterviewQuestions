# application-example.yml
# 
# This is an example configuration file showing different database configurations
# Copy this file to create environment-specific configs:
#   - application-dev.yml (for development)
#   - application-prod.yml (for production)
#   - application-local.yml (for local testing)

# =============================================================================
# EXAMPLE 1: MySQL + PostgreSQL (Default Template Configuration)
# =============================================================================
spring:
  datasource:
    primary:
      jdbc-url: jdbc:mysql://localhost:3306/ordersdb?useSSL=false&serverTimezone=UTC
      username: root
      password: root123
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: PrimaryHikariPool
    
    secondary:
      jdbc-url: jdbc:postgresql://localhost:5432/usersdb
      username: postgres
      password: postgres123
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        pool-name: SecondaryHikariPool

